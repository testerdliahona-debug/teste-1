<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ata de Reunião Sacramental</title>
    <!-- Tailwind CSS para Estilização Moderna -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- HTML2PDF para exportação de PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Evita qualquer transbordo horizontal no celular */
        html, body {
            max-width: 100%;
            overflow-x: hidden;
            width: 100%;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f7ff;
        }
        
        @media print {
            .no-print { display: none !important; }
            body { background-color: white; }
            #document-container { box-shadow: none !important; margin: 0 !important; padding: 0 !important; }
            .modern-card { box-shadow: none !important; border: 1px solid #cbd5e1 !important; break-inside: avoid; }
        }

        /* Estilo Moderno dos Cartões (Substituindo a tabela rígida) */
        .modern-card {
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #bfdbfe; /* blue-200 */
            background-color: white;
            box-shadow: 0 4px 15px -3px rgba(59, 130, 246, 0.08), 0 2px 6px -4px rgba(59, 130, 246, 0.04);
            margin-bottom: 1.5rem;
        }
        
        .modern-card table {
            border-collapse: collapse;
            width: 100%;
        }

        /* Linhas internas finas e elegantes */
        .modern-card td {
            border-bottom: 1px solid #dbeafe; /* blue-100 */
            border-right: 1px solid #dbeafe;
        }
        
        /* Remove bordas redundantes nas extremidades */
        .modern-card table:last-child tr:last-child td {
            border-bottom: none;
        }
        .modern-card tr td:last-child {
            border-right: none;
        }

        /* Adaptação COMPLETA das tabelas para Mobile (Empilhamento Vertical) */
        @media (max-width: 639px) {
            .modern-card table, 
            .modern-card tbody, 
            .modern-card tr, 
            .modern-card td {
                display: block !important;
                width: 100% !important;
                box-sizing: border-box !important;
            }

            .modern-card td {
                border-right: none !important;
                border-bottom: 1px solid #dbeafe !important;
                padding: 12px 10px !important;
            }

            .modern-card tr:last-child td:last-child {
                border-bottom: none !important;
            }
        }

        /* Campos de Entrada Modernizados */
        .input-field {
            width: 100%;
            max-width: 100%;
            outline: none;
            color: #1f2937;
            font-size: 0.875rem;
            background-color: transparent;
            transition: all 0.2s ease;
            resize: none;
            overflow: hidden;
            padding: 4px;
            border-radius: 4px;
            box-sizing: border-box;
        }
        
        .input-field:focus {
            background-color: #f8fafc;
            box-shadow: inset 0 0 0 1px #93c5fd;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center pb-20 px-3 sm:px-0">

    <!-- Entrada de arquivo oculta para importar rascunho -->
    <input type="file" id="importFile" accept=".json" class="hidden" onchange="importDraft(event)">

    <!-- Barra de Ferramentas Fixa Superior Responsiva -->
    <div class="no-print fixed top-0 left-0 right-0 bg-white shadow-md border-b border-blue-100 z-50 px-3 sm:px-6 py-3 flex flex-col gap-3 sm:flex-row sm:justify-between sm:items-center">
        <div class="flex items-center gap-2 pr-4 shrink-0">
            <svg class="w-5 h-5 sm:w-6 sm:h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            <h1 class="font-semibold text-blue-900 text-sm sm:text-base">Gerador de Ata</h1>
        </div>
        
        <div class="flex flex-wrap gap-2 justify-end items-center w-full sm:w-auto">
            <!-- Botão de Bloqueio -->
            <button id="lockBtn" onclick="toggleLock()" class="px-2.5 py-1.5 sm:px-4 sm:py-2 text-xs sm:text-sm font-medium text-green-700 bg-green-50 hover:bg-green-100 border border-green-200 rounded-lg shadow-sm transition-all flex items-center gap-1 sm:gap-2">
                <svg id="lockIconOpen" class="w-3.5 h-3.5 sm:w-4 sm:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z"></path></svg>
                <svg id="lockIconClosed" class="w-3.5 h-3.5 sm:w-4 sm:h-4 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                <span id="lockText" class="inline">Liberado</span>
            </button>

            <div class="w-px h-6 bg-gray-200 self-center hidden sm:block"></div>

            <!-- Botões de Rascunho / Backup -->
            <button onclick="exportDraft()" class="px-2.5 py-1.5 sm:px-4 sm:py-2 text-xs sm:text-sm font-medium text-blue-700 bg-blue-50 hover:bg-blue-100 rounded-lg shadow-sm border border-blue-200 transition-colors flex items-center gap-1 sm:gap-2" title="Baixar arquivo de rascunho para editar depois">
                <svg class="w-3.5 h-3.5 sm:w-4 sm:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
                <span class="inline">Salvar Rascunho</span>
            </button>

            <button onclick="triggerImport()" class="px-2.5 py-1.5 sm:px-4 sm:py-2 text-xs sm:text-sm font-medium text-blue-700 bg-blue-50 hover:bg-blue-100 rounded-lg shadow-sm border border-blue-200 transition-colors flex items-center gap-1 sm:gap-2" title="Carregar um arquivo de rascunho salvo no seu aparelho">
                <svg class="w-3.5 h-3.5 sm:w-4 sm:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>

                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path>

                                <textarea id="pianista" rows="1" class="input-field" placeholder="Nome"></textarea>
                            </td>

                    </tbody>

                <table>

                                <textarea id="hino1" rows="1" class="input-field" placeholder="Nº e Título do Hino"></textarea>

                                <label class="block text-[10px] font-bold text-blue-600 uppercase tracking-wider mb-1">2º Orador</label>

                                <textarea id="hino_especial" rows="1" class="input-field" placeholder="Nº e Título do Hino ou Detalhes da Apresentação"></textarea>

            <!-- 5 - ENCERRAMENTO -->

                                <h2 class="font-bold text-blue-900 text-sm ml-1">5 - ENCERRAMENTO</h2>

                                <textarea id="ultimo_hino" rows="1" class="input-field" placeholder="Nº e Título do Hino"></textarea>

    <!-- Div de Toasts Flutuantes Personalizados (Sem alert padrão) -->
    <div id="toast-container" class="no-print fixed bottom-5 right-5 z-[200] flex flex-col gap-2 pointer-events-none"></div>

    <script>
        // Inicializa o auto-ajuste de altura das textareas e restaura o rascunho anterior
        document.addEventListener('DOMContentLoaded', () => {
            const textareas = document.querySelectorAll('textarea');
            textareas.forEach(textarea => {
                textarea.addEventListener('input', autoResize);
            });

            // Tenta recuperar rascunho salvo no navegador
            loadDraftFromLocalStorage();

            // Ativa o salvamento automático ao digitar
            document.getElementById('ata-form').addEventListener('input', saveDraftToLocalStorage);
        });

        function autoResize() {
            this.style.height = 'auto';
            this.style.height = this.scrollHeight + 'px';
        }

        // Sistema de Notificações Toast Modernas e Elegantes
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            const bgClass = type === 'error' ? 'bg-red-500' : 'bg-blue-600';
            
            toast.className = `flex items-center gap-2 text-white text-xs font-semibold px-4 py-3 rounded-xl shadow-lg transition-all duration-300 transform translate-y-5 opacity-0 ${bgClass} pointer-events-auto max-w-xs`;
            toast.innerHTML = `
                <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <span>${message}</span>
            `;
            
            container.appendChild(toast);
            
            // Entrada do Toast
            setTimeout(() => {
                toast.classList.remove('translate-y-5', 'opacity-0');
            }, 10);
            
            // Saída e Remoção do Toast
            setTimeout(() => {
                toast.classList.add('translate-y-5', 'opacity-0');
                setTimeout(() => {
                    toast.remove();
                }, 300);
            }, 3500);
        }

        // Salva os dados no armazenamento do navegador (LocalStorage)
        function saveDraftToLocalStorage() {
            if (isLocked) return;
            const data = {};
            document.querySelectorAll('#ata-form input, #ata-form textarea').forEach(element => {
                data[element.id] = element.value;
            });
            localStorage.setItem('ata_sacramental_rascunho', JSON.stringify(data));
        }

        // Carrega dados recuperados do navegador ao abrir o site
        function loadDraftFromLocalStorage() {
            const saved = localStorage.getItem('ata_sacramental_rascunho');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    preencherCampos(data);
                    showToast("Rascunho anterior recuperado automaticamente!");
                } catch (e) {
                    console.error("Erro ao ler rascunho local", e);
                }
            }
        }

        // Preenche os campos do formulário com um objeto de dados
        function preencherCampos(data) {
            Object.keys(data).forEach(id => {
                const element = document.getElementById(id);
                if (element) {
                    element.value = data[id];
                    if (element.tagName === 'TEXTAREA') {
                        element.style.height = 'auto';
                        element.style.height = element.scrollHeight + 'px';
                    }
                }
            });
        }

        // Exportar rascunho de backup em arquivo JSON
        function exportDraft() {
            const data = {};
            document.querySelectorAll('#ata-form input, #ata-form textarea').forEach(element => {
                data[element.id] = element.value;
            });

            const jsonString = JSON.stringify(data, null, 2);
            const blob = new Blob([jsonString], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            
            const dataDef = data['data'] ? `_${data['data']}` : '';
            const link = document.createElement('a');
            link.href = url;
            link.download = `Ata_Rascunho${dataDef}.json`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            
            showToast("Arquivo de rascunho (.json) baixado com sucesso!");
        }

        // Aciona a caixa de escolha de arquivo
        function triggerImport() {
            if (isLocked) {
                showToast("Desbloqueie a ata antes de carregar um rascunho.", "error");
                return;
            }
            document.getElementById('importFile').click();
        }

        // Importar arquivo JSON selecionado
        function importDraft(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    preencherCampos(data);
                    saveDraftToLocalStorage(); // Salva no localstorage também
                    showToast("Rascunho importado e preenchido com sucesso!");
                } catch (error) {
                    showToast("Erro ao importar: Arquivo inválido ou corrompido.", "error");
                }
            };
            reader.readAsText(file);
            event.target.value = ''; // Reseta o input de arquivo
        }

        // Função de Bloqueio/Desbloqueio
        let isLocked = false;
        function toggleLock() {
            isLocked = !isLocked;
            const btn = document.getElementById('lockBtn');
            const text = document.getElementById('lockText');
            const iconOpen = document.getElementById('lockIconOpen');
            const iconClosed = document.getElementById('lockIconClosed');
            const inputs = document.querySelectorAll('#ata-form input, #ata-form textarea');

            if (isLocked) {
                // Estado Bloqueado (Vermelho)
                btn.classList.remove('text-green-700', 'bg-green-50', 'hover:bg-green-100', 'border-green-200');
                btn.classList.add('text-red-700', 'bg-red-50', 'hover:bg-red-100', 'border-red-200');
                iconOpen.classList.add('hidden');
                iconClosed.classList.remove('hidden');
                text.innerText = 'Bloqueado';

                inputs.forEach(input => {
                    input.readOnly = true;
                    input.classList.add('opacity-60', 'cursor-not-allowed');
                });
                showToast("Ata bloqueada para edições.");
            } else {
                // Estado Liberado (Verde)
                btn.classList.remove('text-red-700', 'bg-red-50', 'hover:bg-red-100', 'border-red-200');
                btn.classList.add('text-green-700', 'bg-green-50', 'hover:bg-green-100', 'border-green-200');
                iconOpen.classList.remove('hidden');
                iconClosed.classList.add('hidden');
                text.innerText = 'Liberado';

                inputs.forEach(input => {
                    input.readOnly = false;
                    input.classList.remove('opacity-60', 'cursor-not-allowed');
                });
                showToast("Ata liberada para edições.");
            }
        }
    </script>
</body>
</html>
