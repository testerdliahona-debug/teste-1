<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ata de Reunião Sacramental</title>
    <!-- Tailwind CSS para Estilização Moderna -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- HTML2PDF para exportação de PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Evita qualquer transbordo horizontal no celular */
        html, body {
            max-width: 100%;
            overflow-x: hidden;
            width: 100%;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f7ff;
        }
        
        @media print {
            .no-print { display: none !important; }
            body { background-color: white; }
            #document-container { box-shadow: none !important; margin: 0 !important; padding: 0 !important; }
            .modern-card { box-shadow: none !important; border: 1px solid #cbd5e1 !important; break-inside: avoid; }
        }

        /* Estilo Moderno dos Cartões (Substituindo a tabela rígida) */
        .modern-card {
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #bfdbfe; /* blue-200 */
            background-color: white;
            box-shadow: 0 4px 15px -3px rgba(59, 130, 246, 0.08), 0 2px 6px -4px rgba(59, 130, 246, 0.04);
            margin-bottom: 1.5rem;
        }
        
        .modern-card table {
            border-collapse: collapse;
            width: 100%;
        }

        /* Linhas internas finas e elegantes */
        .modern-card td {
            border-bottom: 1px solid #dbeafe; /* blue-100 */
            border-right: 1px solid #dbeafe;
        }
        
        /* Remove bordas redundantes nas extremidades */
        .modern-card table:last-child tr:last-child td {
            border-bottom: none;
        }
        .modern-card tr td:last-child {
            border-right: none;
        }

        /* Adaptação COMPLETA das tabelas para Mobile (Empilhamento Vertical) */
        @media (max-width: 639px) {
            .modern-card table, 
            .modern-card tbody, 
            .modern-card tr, 
            .modern-card td {
                display: block !important;
                width: 100% !important;
                box-sizing: border-box !important;
            }

            .modern-card td {
                border-right: none !important;
                border-bottom: 1px solid #dbeafe !important;
                padding: 12px 10px !important;
            }

            .modern-card tr:last-child td:last-child {
                border-bottom: none !important;
            }
        }

        /* Campos de Entrada Modernizados */
        .input-field {
            width: 100%;
            max-width: 100%;
            outline: none;
            color: #1f2937;
            font-size: 0.875rem;
            background-color: transparent;
            transition: all 0.2s ease;
            resize: none;
            overflow: hidden;
            padding: 4px;
            border-radius: 4px;
            box-sizing: border-box;
        }
        
        .input-field:focus {
            background-color: #f8fafc;
            box-shadow: inset 0 0 0 1px #93c5fd;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center pb-20 px-3 sm:px-0">

                <svg id="lockIconOpen" class="w-3.5 h-3.5 sm:w-4 sm:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z"></path></svg>
                <svg id="lockIconClosed" class="w-3.5 h-3.5 sm:w-4 sm:h-4 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>

                <svg class="w-3.5 h-3.5 sm:w-4 sm:h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 1.5L18.5 9H13V3.5zM6 20V4h6v6h6v10H6z"/></svg>

    <!-- Div de Toasts Flutuantes Personalizados (Sem alert padrão) -->
    <div id="toast-container" class="no-print fixed bottom-5 right-5 z-[200] flex flex-col gap-2 pointer-events-none"></div>

    <script>
        // Inicializa o auto-ajuste de altura das textareas
        document.addEventListener('DOMContentLoaded', () => {
            const textareas = document.querySelectorAll('textarea');
            textareas.forEach(textarea => {
                textarea.addEventListener('input', autoResize);
                autoResize.call(textarea);
            });
        });

        function autoResize() {
            this.style.height = 'auto';
            this.style.height = this.scrollHeight + 'px';
        }

        // Sistema de Notificações Toast Modernas e Elegantes
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            const bgClass = type === 'error' ? 'bg-red-500' : 'bg-blue-600';
            
            toast.className = `flex items-center gap-2 text-white text-xs font-semibold px-4 py-3 rounded-xl shadow-lg transition-all duration-300 transform translate-y-5 opacity-0 ${bgClass} pointer-events-auto max-w-xs`;
            toast.innerHTML = `
                <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <span>${message}</span>
            `;
            
            container.appendChild(toast);
            
            // Entrada do Toast
            setTimeout(() => {
                toast.classList.remove('translate-y-5', 'opacity-0');
            }, 10);
            
            // Saída e Remoção do Toast
            setTimeout(() => {
                toast.classList.add('translate-y-5', 'opacity-0');
                setTimeout(() => {
                    toast.remove();
                }, 300);
            }, 3500);
        }

        // Função de Bloqueio/Desbloqueio
        let isLocked = false;
        function toggleLock() {
            isLocked = !isLocked;
            const btn = document.getElementById('lockBtn');
            const text = document.getElementById('lockText');
            const iconOpen = document.getElementById('lockIconOpen');
            const iconClosed = document.getElementById('lockIconClosed');
            const inputs = document.querySelectorAll('#ata-form input, #ata-form textarea');

            if (isLocked) {
                // Estado Bloqueado (Vermelho)
                btn.classList.remove('text-green-700', 'bg-green-50', 'hover:bg-green-100', 'border-green-200');
                btn.classList.add('text-red-700', 'bg-red-50', 'hover:bg-red-100', 'border-red-200');
                iconOpen.classList.add('hidden');
                iconClosed.classList.remove('hidden');
                text.innerText = 'Bloqueado';

                inputs.forEach(input => {
                    input.readOnly = true;
                    input.classList.add('opacity-60', 'cursor-not-allowed');
                });
                showToast("Ata bloqueada para edições.");
            } else {
                // Estado Liberado (Verde)
                btn.classList.remove('text-red-700', 'bg-red-50', 'hover:bg-red-100', 'border-red-200');
                btn.classList.add('text-green-700', 'bg-green-50', 'hover:bg-green-100', 'border-green-200');
                iconOpen.classList.remove('hidden');
                iconClosed.classList.add('hidden');
                text.innerText = 'Liberado';

                inputs.forEach(input => {
                    input.readOnly = false;
                    input.classList.remove('opacity-60', 'cursor-not-allowed');
                });
                showToast("Ata liberada para edições.");
            }
        }

        // Função para limpar o formulário (Mantida caso seja chamada internamente)
        function limparFormulario() {
            if (isLocked) {
                showToast("Desbloqueie a ata antes de limpar os dados.", "error");
                return;
            }
            document.getElementById("ata-form").reset();
            setTimeout(() => {
                const textareas = document.querySelectorAll('textarea');
                textareas.forEach(textarea => {
                    textarea.style.height = 'auto';
                    if (textarea.rows > 1) {
                         textarea.style.height = textarea.scrollHeight + 'px';
                    }
                });
            }, 10);
            showToast("Dados da ata limpos com sucesso.");
        }

        // Função para exportar para PDF com alta qualidade
        function exportPDF() {
            const elemento = document.getElementById('document-container');
            
            const opt = {
                margin:       [10, 10, 15, 10], // Margens: topo, direita, baixo, esquerda
                filename:     'Ata_Sacramental.pdf',
                image:        { type: 'jpeg', quality: 1 },
                // Configura largura virtual de desktop (1000px) para que o PDF nunca saia "esmagado"
                html2canvas:  { scale: 2, useCORS: true, windowWidth: 1000 },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(elemento).save();
            showToast("Gerando arquivo PDF para download...");
        }

        // Função para exportar para Word (DOC) com estrutura 100% limpa para Google Docs
        function exportWord() {
            const formElement = document.getElementById('document-container');
            const clone = formElement.cloneNode(true);
            
            // 1. Remove as margens e sombras do layout do app
            clone.removeAttribute('id');
            clone.classList.remove('shadow-lg', 'mt-24', 'mt-20', 'sm:mt-24', 'border', 'border-blue-100', 'p-4', 'sm:p-10');
            clone.style.width = '100%';
            clone.style.maxWidth = '800px';
            clone.style.margin = '0 auto';
            clone.style.fontFamily = 'Segoe UI, Arial, sans-serif';

            // 2. Substitui inputs e textareas por conteúdo textual simples (estilo Word)
            const inputs = formElement.querySelectorAll('input, textarea');
            const cloneInputs = clone.querySelectorAll('input, textarea');
            
            inputs.forEach((input, index) => {
                let valor = input.value;
                if(input.type === 'date' && valor) {
                    const parts = valor.split('-');
                    valor = `${parts[2]}/${parts[1]}/${parts[0]}`;
                }
                
                const span = document.createElement('span');
                span.innerText = valor || ' ';
                span.style.fontSize = '11pt';
                span.style.color = '#1f2937';
                span.style.display = 'block';
                span.style.minHeight = '18px';
                span.style.whiteSpace = 'pre-wrap';
                span.style.fontFamily = 'Segoe UI, Arial, sans-serif';
                
                const parent = cloneInputs[index].parentNode;
                parent.replaceChild(span, cloneInputs[index]);
            });

            // 3. Varre todo o clone e remove todas as classes CSS utilitárias do Tailwind,
            // injetando estilos HTML inline tradicionais que o Word e o Google Docs amam.
            const allCloneElements = clone.querySelectorAll('*');
            allCloneElements.forEach((el) => {
                const tagName = el.tagName.toLowerCase();
                
                // Mapeia classes de largura antes de limpá-las
                const isHalfWidth = el.classList.contains('sm:w-1/2') || el.classList.contains('w-1/2');
                const is20Percent = el.classList.contains('sm:w-[20%]') || el.classList.contains('w-[20%]');
                const is80Percent = el.classList.contains('sm:w-[80%]') || el.classList.contains('w-[80%]');
                const isHeaderBg = el.classList.contains('bg-blue-50/60');
                const isFlexRow = el.classList.contains('flex') || el.classList.contains('justify-between');
                const isFlexItem = el.classList.contains('flex') && el.classList.contains('items-center');

                // Limpa completamente todas as classes utilitárias para evitar conflitos no editor do Word
                el.className = '';

                if (tagName === 'tr') {
                    el.style.display = 'table-row';
                } else if (tagName === 'td') {
                    el.style.display = 'table-cell';
                    el.style.border = '1px solid #bfdbfe';
                    el.style.padding = '8px';
                    el.style.verticalAlign = 'top';
                    
                    // Garante larguras exatas para que nenhuma coluna fique esmagada
                    if (isHalfWidth) {
                        el.style.width = '50%';
                    } else if (is20Percent) {
                        el.style.width = '20%';
                    } else if (is80Percent) {
                        el.style.width = '80%';
                    }
                } else if (tagName === 'table') {
                    el.style.width = '100%';
                    el.style.borderCollapse = 'collapse';
                    el.style.marginBottom = '15px';
                } else if (tagName === 'h1') {
                    el.style.textAlign = 'center';
                    el.style.color = '#1e3a8a';
                    el.style.fontSize = '16pt';
                    el.style.fontWeight = 'bold';
                    el.style.marginBottom = '20px';
                    el.style.textTransform = 'uppercase';
                    el.style.fontFamily = 'Segoe UI, Arial, sans-serif';
                } else if (tagName === 'h2') {
                    el.style.fontSize = '11pt';
                    el.style.color = '#1e3a8a';
                    el.style.fontWeight = 'bold';
                    el.style.margin = '0';
                    el.style.fontFamily = 'Segoe UI, Arial, sans-serif';
                } else if (tagName === 'label') {
                    el.style.display = 'block';
                    el.style.fontSize = '8pt';
                    el.style.color = '#2563eb';
                    el.style.fontWeight = 'bold';
                    el.style.textTransform = 'uppercase';
                    el.style.marginBottom = '3px';
                    el.style.fontFamily = 'Segoe UI, Arial, sans-serif';
                } else if (tagName === 'span' && el.style.fontSize !== '11pt') {
                    el.style.fontSize = '8pt';
                    el.style.color = '#2563eb';
                    el.style.fontWeight = 'bold';
                    el.style.textTransform = 'uppercase';
                    el.style.fontFamily = 'Segoe UI, Arial, sans-serif';
                }

                // Ajusta os blocos de cartões modernos
                if (el.tagName === 'DIV' && !isFlexRow && !isFlexItem) {
                    el.style.fontFamily = 'Segoe UI, Arial, sans-serif';
                }

                // Mantém os cabeçalhos com o fundo azul suave tradicional
                if (isHeaderBg) {
                    el.style.backgroundColor = '#eff6ff';
                }

                // Corrige problemas com estruturas flexbox no Word
                if (isFlexRow) {
                    el.style.display = 'block';
                    el.style.width = '100%';
                } else if (isFlexItem) {
                    el.style.display = 'inline-block';
                    el.style.marginRight = '20px';
                }
            });

            const cabecalhoWord = `
                <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                <head>
                    <meta charset='utf-8'>
                    <title>Ata Sacramental</title>
                    <style>
                        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 20px; }
                    </style>
                </head>
                <body>
            `;
            
            const rodapeWord = "</body></html>";
            const conteudoHTML = cabecalhoWord + clone.innerHTML + rodapeWord;
            
            const blob = new Blob(['\ufeff', conteudoHTML], {
                type: 'application/msword'
            });
            
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'Ata_Sacramental.doc';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            
            showToast("Gerando arquivo Word para download...");
        }
    </script>
</body>
</html>
